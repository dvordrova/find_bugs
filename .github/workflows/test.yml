name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare git diff baseline
        run: |
          if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            git init
            git add -A
          fi

      - name: Run repository checks
        run: make test
