name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show git context
        run: |
          cd "$GITHUB_WORKSPACE"
          pwd
          git rev-parse --show-toplevel
          git status --short

      - name: Run repository checks
        run: |
          cd "$GITHUB_WORKSPACE"
          make test
