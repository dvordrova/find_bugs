name: test

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: ${{ github.workspace }}

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.4
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show git context
        run: |
          pwd
          git rev-parse --show-toplevel
          git status --short

      - name: Run repository checks
        run: make test
